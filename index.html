<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3BeerArt</title>
  <meta name="description" content="3Beer Art">

  <!-- Favicon ديناميكي حسب ثيم الجهاز -->
  <link rel="icon" href="images/art/favicon-dark.png" media="(prefers-color-scheme: light)" type="image/png">
  <link rel="icon" href="images/art/favicon-light.png" media="(prefers-color-scheme: dark)" type="image/png">
  <!-- احتياطي للمتصفحات القديمة -->
  <link rel="alternate icon" href="images/art/favicon-light.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    /* خط SST Arabic Medium */
    @font-face {
      font-family: 'SST Arabic';
      src: url('fonts/SST-Arabic-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --blue-deep:   #0d2236;
      --blue-dark:   #1a3d5c;
      --blue-main:   #255a85;
      --blue-bright: #3674a3;
      --blue-pale:   #a8c5dc;
      --white:       #ffffff;
      --sketch-bg:   #f5e9e3;
      --sketch-ink:  #2d4763;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    html, body {
      width: 100%;
      min-height: 100%;
      max-width: 100vw;
      overflow-x: hidden;
    }
    body {
      background: var(--blue-deep);
      font-family: 'Cairo', sans-serif;
    }

    /* ╔═══════════════════════════════╗
       ║  WELCOME OVERLAY              ║
       ╚═══════════════════════════════╝ */
    #welcome {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: grab;
      background: var(--sketch-bg);
      overflow: hidden;
      transition: opacity 0.8s ease;
    }
    #welcome:active { cursor: grabbing; }
    #welcome.dismissed { opacity: 0; pointer-events: none; }

    .circle-bg {
      position: absolute;
      top: 50%; left: 50%;
      width: 440px; height: 440px;
      transform: translate(-50%, -50%) scale(1);
      background:
        radial-gradient(circle at center, #1e4266 0%, #0d2236 75%, #081726 100%);
      border-radius: 50%;
      z-index: 2;
      transition: transform 1.2s cubic-bezier(.7, 0, .3, 1);
      box-shadow:
        inset 0 0 100px rgba(255, 255, 255, 0.05),
        0 10px 60px rgba(13, 34, 54, 0.3);
    }
    .circle-bg::before {
      content: '';
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      background:
        repeating-radial-gradient(circle at center,
          transparent 0, transparent 3px,
          rgba(255, 255, 255, 0.035) 3px, rgba(255, 255, 255, 0.035) 4px);
    }

    /* شعار صغير داخل الدائرة في الترحيب */
    .circle-logo {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      width: 120px;
      height: 120px;
      object-fit: contain;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .icons-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .deco-icon {
      position: absolute;
      width: 70px; height: 70px;
    }
    .deco-icon img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    /* الدائرة 440px = نصف قطر 220px في المنتصف
       12 أيقونة في كل جهة - توزيع 3-3-3-3 */

    /* ━━━━━━━ مجموعة اليسار (12 أيقونة) ━━━━━━━ */
    /* الصف 1 - الأعلى: كتاب، بطيخة، رأس بدولار */
    .ic-l-book      { top: 18%; left: calc(50% - 480px); }
    .ic-l-melon     { top: 18%; left: calc(50% - 380px); }
    .ic-l-head      { top: 18%; left: calc(50% - 290px); }

    /* الصف 2: نبتة، مصافحة، لوحة ألوان */
    .ic-l-plant     { top: 35%; left: calc(50% - 485px); }
    .ic-l-hands     { top: 35%; left: calc(50% - 395px); width: 95px; height: 95px; }
    .ic-l-palette   { top: 35%; left: calc(50% - 290px); }

    /* الصف 3: هدف، فقاعة كلام، دولار */
    .ic-l-target    { top: 52%; left: calc(50% - 490px); }
    .ic-l-chat      { top: 52%; left: calc(50% - 385px); }
    .ic-l-dollar    { top: 52%; left: calc(50% - 290px); }

    /* الصف 4 - الأسفل: تقويم، مصباح، كرة أرضية */
    .ic-l-calendar  { top: 68%; left: calc(50% - 490px); width: 95px; height: 95px; }
    .ic-l-bulb      { top: 70%; left: calc(50% - 385px); }
    .ic-l-globe     { top: 70%; left: calc(50% - 290px); }

    /* ━━━━━━━ مجموعة اليمين (مرآة) ━━━━━━━ */
    .ic-r-book      { top: 18%; right: calc(50% - 480px); }
    .ic-r-melon     { top: 18%; right: calc(50% - 380px); }
    .ic-r-head      { top: 18%; right: calc(50% - 290px); }

    .ic-r-plant     { top: 35%; right: calc(50% - 485px); }
    .ic-r-hands     { top: 35%; right: calc(50% - 395px); width: 95px; height: 95px; }
    .ic-r-palette   { top: 35%; right: calc(50% - 290px); }

    .ic-r-target    { top: 52%; right: calc(50% - 490px); }
    .ic-r-chat      { top: 52%; right: calc(50% - 385px); }
    .ic-r-dollar    { top: 52%; right: calc(50% - 290px); }

    .ic-r-calendar  { top: 68%; right: calc(50% - 490px); width: 95px; height: 95px; }
    .ic-r-bulb      { top: 70%; right: calc(50% - 385px); }
    .ic-r-globe     { top: 70%; right: calc(50% - 290px); }

    .welcome-final {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease 0.5s;
      pointer-events: none;
    }
    .welcome-final.show { opacity: 1; }
    .welcome-logo {
      width: 220px;
      height: 220px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }
    @media (max-width: 700px) {
      .welcome-logo { width: 160px; height: 160px; }
      .circle-logo { width: 80px; height: 80px; }
    }

    #hint {
      position: absolute; bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      transition: opacity 0.5s ease;
    }
    #hint p {
      color: var(--sketch-ink);
      font-family: 'Cairo', sans-serif;
      font-size: 11px; letter-spacing: .3em;
      font-weight: 500;
    }
    .mouse {
      width: 24px; height: 38px;
      border: 1.5px solid var(--sketch-ink);
      border-radius: 12px;
      position: relative; display: flex; justify-content: center;
    }
    .mdot {
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--sketch-ink); position: absolute; top: 6px;
      animation: mdot 1.8s ease-in-out infinite;
    }
    @keyframes mdot {
      0%   { transform: translateY(0); opacity: 1; }
      80%  { transform: translateY(18px); opacity: 0; }
      100% { transform: translateY(0); opacity: 0; }
    }

    @media (max-width: 900px) {
      .circle-bg { width: 280px; height: 280px; }
      .icons-layer { width: 100%; height: 100%; }

      /* إخفاء كل الأيقونات على الجوال */
      .deco-icon { display: none; }

      /* عرض 4 أيقونات مختارة فقط حول الدائرة (top, bottom, left, right) */
      .ic-l-melon,
      .ic-r-palette,
      .ic-l-globe,
      .ic-r-hands {
        display: block !important;
        width: 60px !important;
        height: 60px !important;
      }

      /* بطيخة فوق الدائرة */
      .ic-l-melon {
        top: 18% !important;
        left: 50% !important;
        transform: translateX(-50%);
      }

      /* لوحة ألوان يمين الدائرة */
      .ic-r-palette {
        top: 50% !important;
        right: 8% !important;
        transform: translateY(-50%);
      }

      /* كرة أرضية تحت الدائرة */
      .ic-l-globe {
        top: auto !important;
        bottom: 22% !important;
        left: 50% !important;
        transform: translateX(-50%);
      }

      /* مصافحة يسار الدائرة */
      .ic-r-hands {
        top: 50% !important;
        right: auto !important;
        left: 8% !important;
        transform: translateY(-50%);
      }
    }

    /* ╔═══════════════════════════════╗
       ║  MAIN SITE                    ║
       ╚═══════════════════════════════╝ */
    #site {
      min-height: 100vh;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      background: var(--blue-deep);
      opacity: 0;
      transition: opacity .7s ease .3s;
      position: relative;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    #site.on { opacity: 1; }

    .site-bg {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(54, 116, 163, 0.2) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(54, 116, 163, 0.15) 0%, transparent 55%);
    }
    .site-stars {
      position: absolute; inset: 0;
      z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 25% 15%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.5px 1.5px at 15% 70%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 85% 85%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 40% 95%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.5), transparent);
      opacity: 0.5;
      animation: starTwinkle 8s ease-in-out infinite alternate;
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 0.7; }
    }

    .site-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 700px;
      padding: 3rem 1rem;
    }

    .logo-placeholder {
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .logo-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .connect-label {
      font-family: 'SST Arabic', 'Cairo', sans-serif;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 2px;
      margin-top: 1rem;
      font-weight: 500;
    }

    .intro-text {
      max-width: 560px;
      margin: 1.5rem auto 0.5rem;
      padding: 0 1rem;
    }
    .intro-text p {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 1.5vw, 1.2rem);
      line-height: 2;
      color: rgba(255, 255, 255, 0.72);
      text-align: center;
      font-style: italic;
      letter-spacing: 0.5px;
      font-weight: 300;
    }
    .intro-text p:lang(ar),
    [lang="ar"] .intro-text p {
      font-family: 'Cairo', sans-serif;
      font-style: normal;
      line-height: 2.1;
    }

    .icons {
      display: flex;
      gap: 1.5rem;
      direction: ltr;
      margin-top: 0.8rem;
    }

    .icon-link {
      width: 58px; height: 58px; border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.04);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; cursor: pointer;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1),
                  border-color .3s, background .3s, box-shadow .3s;
      position: relative;
      backdrop-filter: blur(10px);
      overflow: hidden;
    }
    .icon-link:hover {
      transform: translateY(-6px) scale(1.08);
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
    }
    .icon-link svg {
      width: 22px; height: 22px;
      fill: rgba(255, 255, 255, 0.8);
      transition: fill .3s;
      position: relative;
      z-index: 2;
    }
    .icon-link:hover svg { fill: var(--white); }
    .icon-link .tip {
      position: absolute; bottom: -24px;
      font-family: 'Cormorant Garamond', serif;
      font-size: .75rem; letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.85);
      white-space: nowrap; opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      font-style: italic;
    }
    .icon-link:hover .tip { opacity: 1; }

    /* تأثير التموّج (Ripple) */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0);
      animation: rippleExpand 0.7s cubic-bezier(.2, .8, .2, 1);
      pointer-events: none;
      z-index: 1;
    }
    @keyframes rippleExpand {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    .site-footer {
      position: absolute;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      z-index: 2;
    }
    .site-footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-style: italic;
      color: var(--white);
      letter-spacing: 3px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<!-- ═══════ MAIN SITE ═══════ -->
<div id="site">
  <div class="site-bg"></div>
  <div class="site-stars"></div>

  <div class="site-content">
    <div class="logo-placeholder">
      <img src="images/art/logo_white.png" alt="3Beer Art">

    <div class="intro-text">
      <p>
        في عالمٍ يَعجّ بالضجيج، نختارُ الصمت.
        كلُّ صورةٍ حكايةٌ، وكلُّ لقطةٍ مرآةٌ لذاتٍ تبحث عن جمالها الخاص.
        نؤمنُ أنّ الفنَّ ليس ما يُرى فحسب، بل ما يَسكنُ القلبَ بعد أن تغيب الصورة.
        هنا، نلتقي — حيث يلتقي الأزرقُ بالضوء، والخيالُ بالحقيقة.

      </a>
    </div>
  </div>

  <div class="site-footer">
    <div class="site-footer-brand">3BeerArt</div>
  </div>
</div>

<div id="welcome">

  <div class="icons-layer" id="iconsLayer">

    <!-- ━━━ مجموعة اليسار ━━━ -->

    <div class="deco-icon ic-r-book"><img src="icons/5.png" alt=""></div>
    <div class="deco-icon ic-r-melon"><img src="icons/6.png" alt=""></div>
    <div class="deco-icon ic-r-head"><img src="icons/15.png" alt=""></div>
    <!-- الصف 2 -->
    <div class="deco-icon ic-r-plant"><img src="icons/7.png" alt=""></div>
    <div class="deco-icon ic-r-hands"><img src="icons/3.png" alt=""></div>
    <div class="deco-icon ic-r-palette"><img src="icons/14.png" alt=""></div>
    <!-- الصف 3 -->
    <div class="deco-icon ic-r-target"><img src="icons/9.png" alt=""></div>
    <div class="deco-icon ic-r-chat"><img src="icons/4.png" alt=""></div>

  <!-- الدائرة الكحلية -->
  <div class="circle-bg" id="circleBg"></div>

  <!-- شعار صغير داخل الدائرة -->
  <img src="images/art/logo_white.png" alt="" class="circle-logo" id="circleLogo">

  <!-- الشعار الكبير يظهر بعد توسّع الدائرة -->
  <div class="welcome-final" id="welcomeFinal">
    <img src="images/art/logo_white.png" alt="3Beer Art" class="welcome-logo">

  <div id="hint">
    <p>اسحب للأعلى</p>

<script>
  const welcome      = document.getElementById('welcome');
  const circleBg     = document.getElementById('circleBg');
  const circleLogo   = document.getElementById('circleLogo');
  const iconsLayer   = document.getElementById('iconsLayer');
  const welcomeFinal = document.getElementById('welcomeFinal');
  const hint         = document.getElementById('hint');
  const site         = document.getElementById('site');

  let gone = false, startY = null, currentProgress = 0;

  function maxCircleScale() {
    const diagonal = Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);
    return (diagonal / 440) * 1.3;
  }

  function updateExpansion(progress) {
    currentProgress = progress;
    const scale = 1 + (maxCircleScale() - 1) * progress;
    circleBg.style.transition = 'none';
    circleBg.style.transform = `translate(-50%, -50%) scale(${scale})`;

    circleLogo.style.opacity = 1 - progress * 1.8;
    iconsLayer.style.opacity = 1 - progress * 1.8;
    hint.style.opacity = 1 - progress * 2;

    if (progress > 0.6) {
      welcomeFinal.classList.add('show');
    } else {
      welcomeFinal.classList.remove('show');
    }
  }

  function dismiss() {
    if (gone) return;
    gone = true;

    circleBg.style.transition = 'transform 1.2s cubic-bezier(.7, 0, .3, 1)';
    circleBg.style.transform = `translate(-50%, -50%) scale(${maxCircleScale()})`;
    circleLogo.style.opacity = 0;
    iconsLayer.style.opacity = 0;
    hint.style.opacity = 0;
    welcomeFinal.classList.add('show');

    setTimeout(() => {
      welcome.classList.add('dismissed');
      site.classList.add('on');
      document.body.style.overflow = 'auto';
    }, 2000);
  }

  function drag(dy) {
    if (gone) return;
    const progress = Math.max(0, Math.min(1, -dy / 250));
    updateExpansion(progress);
    if (progress >= 0.95) dismiss();
  }

  function release() {
    if (gone) return;
    if (currentProgress > 0.4) {
      dismiss();
    } else {
      circleBg.style.transition = 'transform 0.6s cubic-bezier(.2, .8, .2, 1)';
      circleBg.style.transform = 'translate(-50%, -50%) scale(1)';
      circleLogo.style.transition = 'opacity 0.5s ease';
      iconsLayer.style.transition = 'opacity 0.5s ease';
      circleLogo.style.opacity = 1;
      iconsLayer.style.opacity = 1;
      hint.style.opacity = 1;
      welcomeFinal.classList.remove('show');
      currentProgress = 0;
      setTimeout(() => {
        circleLogo.style.transition = 'opacity 0.6s ease';
        iconsLayer.style.transition = 'opacity 0.6s ease';
      }, 600);
    }
  }

  welcome.addEventListener('mousedown', e => {
    if (!gone) startY = e.clientY;
  });
  window.addEventListener('mousemove', e => {
    if (startY != null && !gone) drag(e.clientY - startY);
  });
  window.addEventListener('mouseup', () => {
    if (startY != null) { release(); startY = null; }
  });

  welcome.addEventListener('touchstart', e => {
    if (!gone) startY = e.touches[0].clientY;
  }, {passive: true});
  window.addEventListener('touchmove', e => {
    if (startY != null && !gone) drag(e.touches[0].clientY - startY);
  }, {passive: true});
  window.addEventListener('touchend', () => {
    if (startY != null) { release(); startY = null; }
  });

  window.addEventListener('wheel', e => {
    if (!gone && e.deltaY > 20) dismiss();
  }, {passive: true});
  window.addEventListener('keydown', e => {
    if (!gone && ['ArrowDown', 'Space', 'Enter'].includes(e.code)) dismiss();
  });

  // تأثير التموّج (Ripple) على الأيقونات
  document.querySelectorAll('.ripple-host').forEach(el => {
    el.addEventListener('click', function(e) {
      const rect = el.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = e.clientX - rect.left - size / 2;
      const y = e.clientY - rect.top - size / 2;

      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';

      el.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);
    });
  });
</script>

</body>
</html>
